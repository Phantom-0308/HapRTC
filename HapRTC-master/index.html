<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bhaptics WebRTC HapticStream</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 상단 정렬을 위한 수정 */
            justify-content: flex-start; /* 상단 정렬을 위한 수정 */
            height: 100vh;
        }
        .header {
            width: 100%;
            background-color: #254f63;
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 2em;
            font-weight: bold;
        }
        .content {
            padding-top: 80px; /* 헤더 높이만큼 패딩 추가 */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px; /* 요소 간의 간격을 줄이기 위해 gap을 10px로 설정 */
            width: 100%; /* 전체 너비 사용 */
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px; /* 제목과 입력 칸 사이 간격을 줄이기 위해 margin-bottom을 10px로 설정 */
            width: 100%; /* 타이틀을 가운데로 정렬하기 위해 너비를 100%로 설정 */
            text-align: center; /* 텍스트를 가운데 정렬 */
            margin-top: 20px; /* 타이틀을 더 위로 올리기 위해 추가된 코드 */
        }
        .input-container {
            text-align: center;
        }
        .input-container input {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            width: 300px;
        }
        .create-room-button button {
            background-color: #254f63;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .create-room-button button:hover {
            background-color: #254f63;
        }
        .room-list {
            margin-top: 50px; /* Room List를 고정된 위치에 두기 위해 여유 공간을 추가 */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* 전체 너비 사용 */
        }
        .room-item {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .room-item:hover {
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        }
        .room-item button {
            background-color: #254f63;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .room-item button:hover {
            background-color: #254f63;
        }
        .sub-header {
            font-size: 16px;
            color: #ffffff;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">WebRTC-based Haptic Transmission System</div>
    </div>
    <div class="content">
        <div class="title">Display Name</div>
        <div class="input-container">
            <input type="text" id="nickname" placeholder="Enter your Display Name">
        </div>
        <div class="create-room-button">
            <button onclick="createRoom()">Create Room</button>
        </div>
        <div class="title">Room List</div>
        <div class="room-list" id="roomList">
            <!-- 방 목록이 여기에 동적으로 추가됩니다 -->
        </div>
    </div>
    <script>
        async function loadRooms() {
            try {
                const response = await fetch('http://localhost:3030/rooms');
                const data = await response.json();
                const roomList = document.getElementById('roomList');
                roomList.innerHTML = ''; // 기존 방 목록 지우기
                data.rooms.forEach(room => {
                    const roomItem = document.createElement('div');
                    roomItem.className = 'room-item';
                    roomItem.innerHTML = `${room.roomName || "Unknown"}<br>(Users: ${room.users.length})`;
                    const joinButton = document.createElement('button');
                    joinButton.textContent = 'Join Room';
                    joinButton.onclick = () => {
                        const nickname = document.getElementById('nickname').value.trim();
                        if (nickname) {
                            window.location.href = `client_a.html?roomId=${room.roomId}&nickname=${encodeURIComponent(nickname)}`;
                        } else {
                            alert("Please enter your nickname before joining a room.");
                        }
                    };
                    roomItem.appendChild(joinButton);
                    roomList.appendChild(roomItem);
                });
            } catch (error) {
                console.error('Error loading rooms:', error);
            }
        }

        async function createRoom() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                alert("Please enter your Display Name before creating a room.");
                return;
            }
            try {
                const response = await fetch(`http://localhost:3030/generate_room?nickname=${encodeURIComponent(nickname)}`);
                const data = await response.json();
                const roomId = data.roomId;
                if (roomId) {
                    window.location.href = `client_a.html?roomId=${roomId}&nickname=${encodeURIComponent(nickname)}`;
                } else {
                    alert('Error: Room ID is undefined.');
                }
            } catch (error) {
                console.error('Error creating room:', error);
            }
        }

        // 페이지 로드 시 방 목록 불러오기
        window.onload = () => {
            loadRooms();
            setInterval(loadRooms, 10000); // 10초마다 방 목록 새로고침
        };
    </script>
</body>
</html>
